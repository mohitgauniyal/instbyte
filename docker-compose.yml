services:
  instbyte:
    image: mohitgauniyal/instbyte:latest
    # Developers building from source: comment out 'image' above and uncomment below
    # build: .
    ports:
      - "3000:3000"
    volumes:
      - ./instbyte-data:/data
    environment:
      - INSTBYTE_DATA=/data
      - INSTBYTE_UPLOADS=/data/uploads
    restart: unless-stopped
